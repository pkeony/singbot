name: CGV 경량 테스트

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Test direct API (no Puppeteer)
        working-directory: cgv-alert
        run: node test-light.js
